<!DOCTYPE html>
<html lang="pt-br">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Meu Refúgio</title>
     <link rel="icon" href="imagens/icone_app.jpg">
     <link rel="apple-touch-icon" href="imagens/icone_app.jpg">
     <link rel="manifest" href="manifest.json">
     <link rel="stylesheet" href="style.css?v=3">
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400&display=swap"
          rel="stylesheet">
          
     <!-- Google tag (gtag.js) -->
     <script async src="https://www.googletagmanager.com/gtag/js?id=G-0HC0Q8LLBT"></script>
     <script>
       window.dataLayer = window.dataLayer || [];
       function gtag(){dataLayer.push(arguments);}
       gtag('js', new Date());

       gtag('config', 'G-0HC0Q8LLBT');
     </script>
</head>

<body>
     <script>
          if ('serviceWorker' in navigator) {
               window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js');
               });
          }
     </script>

     <main class="tela-inicial">


          <h1 class="titulo-app">Meu Refúgio Tarot</h1>
          <br>
          <p class="texto-introducao">Este não é um oráculo para prever o futuro.<br>
               É um espaço para acolher o presente.</p>

          <div style="margin-top: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%;">
               <a href="emocoes.html" class="botao-iniciar" style="margin: 0; min-width: 250px; padding: 15px 35px;">Entre</a>
               
               <a href="sobre.html" class="botao-iniciar" style="margin: 0; min-width: 250px; padding: 15px 35px; font-size: 1rem;">Conheça a Taróloga</a>

               <!-- Botão de Instalação Customizado (Escondido por padrão) -->
               <button id="btn-instalar" class="botao-voltar" style="display: none; cursor: pointer; border: none; padding: 10px 25px; align-self: center;">
                    Baixar o App
               </button>
          </div>

     </main>

     <script>
          // Lógica para mostrar o botão de instalação
          let promptInstalacao;
          const btnInstalar = document.getElementById('btn-instalar');

          window.addEventListener('beforeinstallprompt', (e) => {
               // Impede o Chrome de mostrar o aviso padrão
               e.preventDefault();
               // Guarda o evento para usar depois
               promptInstalacao = e;
               // Mostra o nosso botão
               if(btnInstalar) {
                    btnInstalar.style.display = 'inline-flex';
               }
          });

          if(btnInstalar) {
               btnInstalar.addEventListener('click', async () => {
                    if (!promptInstalacao) return;
                    // Mostra o prompt de instalação oficial
                    promptInstalacao.prompt();
                    // Aguarda a resposta (Aceitou ou Recusou)
                    const { outcome } = await promptInstalacao.userChoice;
                    // Limpa a variável
                    promptInstalacao = null;
                    // Esconde o botão se foi instalado
                    if (outcome === 'accepted') {
                         btnInstalar.style.display = 'none';
                    }
               });
          }
     </script>




</body>

</html>
