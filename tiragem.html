<html lang="pt-br">

    <link rel="manifest" href="manifest.json">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {

                    <!-- O texto virá dinamicamente do script.js -->
                </p>
                <div class="acoes-leitura">
                    <button class="botao-secundario inativo" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: middle; margin-right: 8px; margin-bottom: 2px;">

                        Meditação Guiada (Em Breve)

                        <p class="texto-contato">Este foi o seu pequeno refúgio de hoje. Para um olhar completo sobre as
                            suas energias e questões, agende uma leitura pessoal.</p>
                        <a href="https://api.whatsapp.com/send?phone=5513997055934" target="_blank" class="botao-whatsapp" id="btn-whatsapp">

                        </a>

    </main>

    <script src="script.js"></script>
    <script>
        // Chama a função que nós criamos no script.js assim que a tela abre
        window.onload = carregarLeitura;
    </script>

</html>
