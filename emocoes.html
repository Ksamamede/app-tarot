<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Refúgio - Emoções</title>
    <link rel="icon" href="imagens/icone_app.jpg">
    <link rel="apple-touch-icon" href="imagens/icone_app.jpg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=4">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400&display=swap"
        rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0HC0Q8LLBT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-0HC0Q8LLBT');
    </script>
</head>

<body>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
    <main class="tela-inicial">

        <p class="texto-introducao">
            Bem-vinda ao seu espaço de reconexão emocional.<br>
            Aqui, os Arcanos do Tarot iluminam o agora.<br>
            Selecione o que você está sentindo e<br>
            receba uma mensagem que acolhe e orienta.
        </p>

        <h2 class="pergunta-sentimento">Como você está se sentindo hoje?</h2>

        <button class="botao-iniciar" onclick="abrirPainel()">❤️ Emoções</button>

        <div id="painel-emocoes" class="painel-emocoes">
            <h3 class="titulo-painel">Sinto...</h3>
            <div class="grade-emocoes">
                <button onclick="selecionar('Ansiedade')">Ansiedade</button>
                <button onclick="selecionar('Apatia')">Apatia</button>
                <button onclick="selecionar('Baixa autoestima')">Baixa autoestima</button>
                <button onclick="selecionar('Bloqueio criativo')">Bloqueio criativo</button>
                <button onclick="selecionar('Cansaço')">Cansaço</button>
                <button onclick="selecionar('Ciúme')">Ciúme</button>
                <button onclick="selecionar('Confusão')">Confusão</button>
                <button onclick="selecionar('Culpa')">Culpa</button>
                <button onclick="selecionar('Dependência emocional')">Dependência emocional</button>
                <button onclick="selecionar('Desânimo')">Desânimo</button>
                <button onclick="selecionar('Desconexão espiritual')">Desconexão espiritual</button>
                <button onclick="selecionar('Desespero')">Desespero</button>
                <button onclick="selecionar('Dificuldade em se expressar')">Dificuldade em se expressar</button>
                <button onclick="selecionar('Dúvida')">Dúvida</button>
                <button onclick="selecionar('Emoção contida')">Emoção contida</button>
                <button onclick="selecionar('Estresse')">Estresse</button>
                <button onclick="selecionar('Excesso de racionalidade')">Excesso de racionalidade</button>
                <button onclick="selecionar('Falta de confiança')">Falta de confiança</button>
                <button onclick="selecionar('Falta de entusiasmo')">Falta de entusiasmo</button>
                <button onclick="selecionar('Falta de propósito')">Falta de propósito</button>
                <button onclick="selecionar('Frustração')">Frustração</button>
                <button onclick="selecionar('Idealização')">Idealização</button>
                <button onclick="selecionar('Impaciência')">Impaciência</button>
                <button onclick="selecionar('Impulsividade')">Impulsividade</button>
                <button onclick="selecionar('Insegurança')">Insegurança</button>
                <button onclick="selecionar('Instabilidade')">Instabilidade</button>
                <button onclick="selecionar('Irritação')">Irritação</button>
                <button onclick="selecionar('Melancolia')">Melancolia</button>
                <button onclick="selecionar('Medo')">Medo</button>
                <button onclick="selecionar('Medo da escassez')">Medo da escassez</button>
                <button onclick="selecionar('Medo de se expor')">Medo de se expor</button>
                <button onclick="selecionar('Procrastinação')">Procrastinação</button>
                <button onclick="selecionar('Raiva')">Raiva</button>
                <button onclick="selecionar('Resistência à mudança')">Resistência à mudança</button>
                <button onclick="selecionar('Sensação de estagnação')">Sensação de estagnação</button>
                <button onclick="selecionar('Solidão')">Solidão</button>
                <button onclick="selecionar('Tristeza')">Tristeza</button>
                <button onclick="selecionar('Vergonha')">Vergonha</button>

            </div>
            <button class="btn-fechar" onclick="fecharPainel()">Voltar</button>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function abrirPainel() {
            document.getElementById('painel-emocoes').classList.add('ativo');
        }
        function fecharPainel() {
            document.getElementById('painel-emocoes').classList.remove('ativo');
        }
    </script>
</body>

</html>
